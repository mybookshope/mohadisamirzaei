<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIRZAEI BOOKSTORE | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --green: #0f3d2e; --gold: #b8863b; --cream: #faf7f0; }
        body { background: var(--cream); font-family: sans-serif; }
        .promo { background: #d32f2f; color: white; text-align: center; padding: 5px; font-size: 13px; font-weight: bold; }
        .navbar { background: white; border-bottom: 3px solid var(--gold); }
        .navbar-brand img { height: 70px; }
        .book-card { background: white; border-radius: 10px; overflow: hidden; transition: 0.3s; border: 1px solid #eee; }
        .book-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .price-new { color: #d32f2f; font-weight: bold; font-size: 18px; }
        footer { background: var(--green); color: white; padding: 40px 0; margin-top: 50px; }
    </style>
</head>
<body>
    <div class="promo">FLASH SALE: 50% OFF ON ALL USED BOOKS!</div>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img src="mylogo.jpg" alt="Logo"></a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link fw-bold" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-3">
                <div class="p-3 bg-white rounded shadow-sm">
                    <h5>Categories</h5>
                    <ul class="list-unstyled">
                        <li><a href="#" class="text-dark text-decoration-none">Fiction</a></li>
                        <li><a href="#" class="text-danger fw-bold text-decoration-none">Bargain Books</a></li>
                        <li><a href="#" class="text-dark text-decoration-none">Children</a></li>
                    </ul>
                </div>
            </div>
            <div class="col-md-9">
                <h2 class="mb-4">Featured Books</h2>
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="book-card">
                            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400" class="w-100" alt="Book">
                            <div class="p-3">
                                <h6>The Art of Thinking</h6>
                                <p class="price-new">€12.50</p>
                                <button class="btn btn-dark btn-sm w-100">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container text-center">
            <p>© 2026 MIRZAEI BOOKSTORE | Lisbon, Portugal</p>
        </div>
    </footer>
</body>
</html>
