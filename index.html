<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRZAEI Bookstore</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

        :root { --dark-green: #1a3a32; --gold: #c5a059; --cream: #f9f7f2; }

        body { background-color: var(--cream); font-family: 'Georgia', serif; color: var(--dark-green); margin: 0; }

        /* Navbar */

        .navbar { background: white; border-bottom: 2px solid var(--gold); padding: 10px 0; }

        .navbar-brand img { height: 70px; }

        /* Hero Section */

        .hero {

            background: linear-gradient(rgba(26, 58, 50, 0.85), rgba(26, 58, 50, 0.85)), 

                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?w=1200');

            background-size: cover; background-position: center;

            height: 60vh; display: flex; align-items: center; justify-content: center;

            color: white; text-align: center; border-bottom: 5px solid var(--gold);

        }

        /* Categories */

        .cat-item {

            width: 100px; height: 100px; background: white; border-radius: 50%;

            display: flex; align-items: center; justify-content: center;

            margin: 0 auto 15px; border: 1px solid var(--gold); font-size: 30px;

            box-shadow: 0 4px 10px rgba(0,0,0,0.1);

        }

        .btn-mirzaei { background: var(--gold); color: white; border-radius: 50px; padding: 10px 30px; border: none; font-weight: bold; }
</style>
</head>
<body>
<nav class="navbar">
<div class="container d-flex justify-content-between align-items-center">
<div class="d-flex align-items-center">
<img src="mylogo.jpg" alt="Logo">
<h2 class="ms-3 mb-0 fw-bold">MIRZAEI</h2>
</div>
<div class="fw-bold">ENGLISH | SHOP</div>
</div>
</nav>
<header class="hero">
<div>
<h1 class="display-3 fw-bold">Onde Cada Livro É Um Mundo</h1>
<p class="lead">Every book is a gateway to a new world. Explore now.</p>
<button class="btn-mirzaei">EXPLORE BOOKS</button>
</div>
</header>
<div class="container my-5 text-center">
<h2 class="mb-5">Popular Categories</h2>
<div class="row">
<div class="col-4 col-md-2"><div class="cat-item">📚</div><p>Fiction</p></div>
<div class="col-4 col-md-2"><div class="cat-item">🧠</div><p>Psychology</p></div>
<div class="col-4 col-md-2"><div class="cat-item">📜</div><p>History</p></div>
<div class="col-4 col-md-2"><div class="cat-item">🧪</div><p>Science</p></div>
<div class="col-4 col-md-2"><div class="cat-item">👶</div><p>Kids</p></div>
<div class="col-4 col-md-2"><div class="cat-item">🎨</div><p>Art</p></div>
</div>
</div>
</body>
</html>
