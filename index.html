<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRZAEI Bookstore</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

        :root { --dark-green: #1a3a32; --gold: #c5a059; --cream: #f9f7f2; }

        body { background-color: var(--cream); font-family: 'Georgia', serif; color: var(--dark-green); margin: 0; }

        /* Navbar */

        .navbar { background: white; border-bottom: 2px solid var(--gold); padding: 10px 0; }

        .navbar-brand img { height: 60px; width: auto; border-radius: 5px; }

        /* Video Hero Section */

        .hero-video {

            position: relative; height: 70vh; overflow: hidden;

            display: flex; align-items: center; justify-content: center; color: white; text-align: center;

        }

        .hero-video video {

            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;

            width: auto; height: auto; z-index: -1; transform: translate(-50%, -50%);

            filter: brightness(0.4);

        }

        .hero-content h1 { font-size: 3.5rem; font-weight: bold; margin-bottom: 20px; }

        .btn-explore { background: var(--gold); color: white; border-radius: 50px; padding: 12px 40px; border: none; font-weight: bold; transition: 0.3s; }

        .btn-explore:hover { background: var(--dark-green); transform: scale(1.05); }
</style>
</head>
<body>
<nav class="navbar sticky-top">
<div class="container d-flex justify-content-between align-items-center">
<div class="d-flex align-items-center">
<img src="mylogo.jpg" alt="Mirzaei Bookstore Logo">
<h3 class="ms-3 mb-0 fw-bold" style="letter-spacing: 2px;">MIRZAEI</h3>
</div>
<div>
<select class="form-select form-select-sm border-warning rounded-pill">
<option>English</option>
<option>Português</option>
<option>Farsi</option>
<option>العربية</option>
</select>
</div>
</div>
</nav>
<header class="hero-video">
<video autoplay muted loop playsinline>
<source src="https://assets.mixkit.co/videos/preview/mixkit-hand-holding-a-book-over-a-table-4513-large.mp4" type="video/mp4">
</video>
<div class="hero-content">
<h1>Onde cada livro é um mundo</h1>
<p class="lead mb-4">Explore thousands of books from all over the globe.</p>
<button class="btn-explore">START EXPLORING</button>
</div>
</header>
<div class="container my-5 text-center">
<h2 class="mb-5" style="border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px;">Our Global Collection</h2>
<div class="row g-4">
<p class="text-muted">Thousands of titles coming soon in every language...</p>
</div>
</div>
</body>
</html>
