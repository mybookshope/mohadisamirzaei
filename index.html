<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRZAEI | Global Video Library</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>

        :root { --gold: #c5a059; }

        body { margin: 0; padding: 0; font-family: 'Arial', sans-serif; background: #000; color: white; overflow-x: hidden; }

        /* استایل ویدیو پس‌زمینه */

        .video-bg {

            position: relative;

            width: 100%;

            height: 80vh;

            overflow: hidden;

            display: flex;

            align-items: center;

            justify-content: center;

        }

        .video-bg video {

            position: absolute;

            top: 50%;

            left: 50%;

            min-width: 100%;

            min-height: 100%;

            width: auto;

            height: auto;

            z-index: -1;

            transform: translate(-50%, -50%);

            filter: brightness(0.4);

        }

        .content-overlay { z-index: 1; text-align: center; }

        /* منوی زبان */

        .lang-switcher {

            background: rgba(255, 255, 255, 0.1);

            color: white;

            border: 1px solid var(--gold);

            padding: 5px 15px;

            border-radius: 20px;

        }

        /* کارت‌های کتاب */

        .book-grid {

            padding: 50px 0;

            background: #111;

        }

        .book-card {

            background: rgba(255, 255, 255, 0.05);

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 10px;

            padding: 15px;

            transition: 0.3s;

            margin-bottom: 20px;

        }

        .book-card:hover {

            border-color: var(--gold);

            transform: scale(1.05);

            background: rgba(255, 255, 255, 0.1);

        }

        .book-card img {

            width: 100%;

            height: 250px;

            object-fit: cover;

            border-radius: 5px;

        }

        .search-bar {

            width: 60%;

            padding: 15px;

            border-radius: 30px;

            border: none;

            margin-top: 20px;

        }
</style>
</head>
<body>
<header class="video-bg">
<video autoplay muted loop playsinline>
<source src="https://assets.mixkit.co/videos/preview/mixkit-turning-the-pages-of-a-book-1577-large.mp4" type="video/mp4">
</video>
<div class="content-overlay container">
<div class="d-flex justify-content-between align-items-center mb-5">
<h2 style="color: var(--gold);">MIRZAEI</h2>
<select class="lang-switcher">
<option>Global (All Languages)</option>
<option>English</option>
<option>Portuguese</option>
<option>Persian</option>
<option>Arabic</option>
<option>French</option>
</select>
</div>
<h1 class="display-2 fw-bold">Explore Thousands of Worlds</h1>
<p class="lead">Books in every language, delivered to your screen.</p>
<input type="text" class="search-bar" placeholder="Search by book name, author, or language...">
</div>
</header>
<main class="book-grid">
<div class="container">
<h3 class="mb-5 text-center" style="border-bottom: 2px solid var(--gold); display: inline-block;">International Best Sellers</h3>
<div class="row">
<div class="col-md-3">
<div class="book-card text-center">
<img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=400" alt="Book">
<h5 class="mt-3">The Art of War</h5>
<p class="small text-muted">Sun Tzu | Chinese/English</p>
<button class="btn btn-sm btn-outline-warning">View Details</button>
</div>
</div>
<div class="col-md-3">
<div class="book-card text-center">
<img src="https://images.unsplash.com/photo-1589998059171-988d887df646?w=400" alt="Book">
<h5 class="mt-3">Dom Casmurro</h5>
<p class="small text-muted">Machado de Assis | Portuguese</p>
<button class="btn btn-sm btn-outline-warning">View Details</button>
</div>
</div>
</div>
</div>
</main>
<section class="video-bg" style="height: 40vh;">
<video autoplay muted loop playsinline>
<source src="https://assets.mixkit.co/videos/preview/mixkit-coffee-and-a-book-4251-large.mp4" type="video/mp4">
</video>
<div class="content-overlay">
<h2>Support for 100+ Languages</h2>
<p>From Persian to Portuguese, we have it all.</p>
</div>
</section>
</body>
</html>
