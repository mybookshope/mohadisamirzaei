<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فروشگاه جهانی کتاب</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
       body { background-color: #0b1120; color: white; font-family: sans-serif; }
       .nav-custom { background: #1e293b; padding: 15px; border-bottom: 2px solid #fbbf24; }
       .language-box { background: #334155; color: #fbbf24; border: 1px solid #fbbf24; border-radius: 5px; cursor: pointer; }
       .hero-section { padding: 80px 0; background: linear-gradient(45deg, #1e293b, #0f172a); text-align: center; margin-bottom: 40px; }
       .book-card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; transition: 0.3s; }
       .book-card:hover { border-color: #fbbf24; transform: translateY(-5px); }
</style>
</head>
<body>
<nav class="nav-custom d-flex justify-content-between align-items-center">
<h4 class="m-0 text-warning">Global BookStore</h4>
<div>
<label class="small me-2">Language / زبان:</label>
<select class="language-box p-1">
<option>Persian (فارسی)</option>
<option>English</option>
<option>Arabic (العربية)</option>
<option>German (Deutsch)</option>
</select>
</div>
</nav>
<div class="hero-section">
<h1 class="display-4 fw-bold">بزرگترین کتابخانه بین‌المللی</h1>
<p class="lead">کتاب‌های گوناگون به تمام زبان‌های جهان</p>
</div>
<div class="container">
<div class="row g-4">
<div class="col-md-4">
<div class="book-card text-center">
<div class="badge bg-warning text-dark mb-2">English</div>
<h5>The Art of Coding</h5>
<p class="text-secondary small">Price: 25$</p>
<button class="btn btn-outline-warning btn-sm">Visit / بازدید</button>
</div>
</div>
<div class="col-md-4">
<div class="book-card text-center">
<div class="badge bg-primary mb-2">فارسی</div>
<h5>دیوان حافظ</h5>
<p class="text-secondary small">قیمت: ۱۲۰ هزار تومان</p>
<button class="btn btn-outline-warning btn-sm">Visit / بازدید</button>
</div>
</div>
</div>
</div>
</body>
</html>
