<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRZAEI BOOKSTORE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root{
    --main-green:#0f4c3a;
    --gold:#b8863b;
    --light:#f8f4ec;
    --white:#ffffff;
    --text:#2d2d2d;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: var(--light);
    color: var(--text);
}

/* TOP BAR */
.top-bar{
    background: var(--main-green);
    color: white;
    padding: 10px 0;
    font-size: 14px;
}

.top-bar .container{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

/* NAVBAR */
.navbar{
    background: white;
    box-shadow: 0 2px 15px rgba(0,0,0,0.05);
}

.navbar-brand img{
    height: 90px;
}

.nav-link{
    font-weight: 600;
    color: var(--main-green) !important;
}

.nav-link:hover{
    color: var(--gold) !important;
}

/* HERO */
.hero{
    padding: 70px 0;
    background: linear-gradient(to right,#f8f4ec,#fffdf8);
}

.hero h1{
    font-size: 55px;
    color: var(--main-green);
    font-weight: bold;
    line-height: 1.3;
}

.hero p{
    font-size: 20px;
    margin: 20px 0;
}

.btn-main{
    background: var(--main-green);
    color: white;
    padding: 14px 30px;
    border: none;
    border-radius: 40px;
    font-weight: bold;
    transition: 0.3s;
}

.btn-main:hover{
    background: #083428;
}

.btn-outline-main{
    border: 2px solid var(--gold);
    color: var(--gold);
    padding: 14px 30px;
    border-radius: 40px;
    font-weight: bold;
    background: transparent;
    margin-left: 10px;
}

.btn-outline-main:hover{
    background: var(--gold);
    color: white;
}

/* FEATURE BOX */
.features{
    margin-top: -40px;
}

.feature-box{
    background: white;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 8px 20px rgba(0,0,0,0.05);
    height: 100%;
}

.feature-box h5{
    color: var(--main-green);
    font-weight: bold;
}

/* SECTION TITLE */
.section-title{
    text-align:center;
    margin: 80px 0 40px;
}

.section-title h2{
    color: var(--main-green);
    font-weight: bold;
}

/* CATEGORY */
.category-card{
    background: white;
    border-radius: 18px;
    padding: 30px;
    text-align:center;
    transition: 0.3s;
    box-shadow: 0 8px 18px rgba(0,0,0,0.05);
}

.category-card:hover{
    transform: translateY(-8px);
}

.category-card h5{
    margin-top: 15px;
    color: var(--main-green);
    font-weight: bold;
}

/* BOOK CARD */
.book-card{
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    transition: 0.3s;
}

.book-card:hover{
    transform: translateY(-8px);
}

.book-card img{
    height: 280px;
    object-fit: cover;
}

.book-content{
    padding: 20px;
}

.book-content h5{
    color: var(--main-green);
    font-weight: bold;
}

.price{
    color: var(--gold);
    font-size: 22px;
    font-weight: bold;
}

/* NEWSLETTER */
.newsletter{
    background: var(--main-green);
    color: white;
    padding: 70px 0;
    margin-top: 80px;
}

.newsletter input{
    height: 55px;
    border-radius: 40px;
    border: none;
    padding-left: 20px;
}

/* FOOTER */
footer{
    background: #083428;
    color: white;
    padding: 30px 0;
    text-align:center;
}

@media(max-width:768px){
    .hero h1{
        font-size: 36px;
    }
    .navbar-brand img{
        height: 70px;
    }
}
</style>
</head>
<body>
<!-- TOP BAR -->
<div class="top-bar">
<div class="container">
<div>
            Free Shipping for Orders Above €49
</div>
<div>
            Contact Us | Login / Register
</div>
</div>
</div>
<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg sticky-top">
<div class="container">
<a class="navbar-brand" href="#">
<img src="images/logo.png" alt="MIRZAEI BOOKSTORE">
</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link" href="#">Home</a></li>
<li class="nav-item"><a class="nav-link" href="#">Bookstore</a></li>
<li class="nav-item"><a class="nav-link" href="#">Categories</a></li>
<li class="nav-item"><a class="nav-link" href="#">Bestsellers</a></li>
<li class="nav-item"><a class="nav-link" href="#">New Books</a></li>
<li class="nav-item"><a class="nav-link" href="#">Blog</a></li>
</ul>
</div>
</div>
</nav>
<!-- HERO -->
<section class="hero">...</section>
<footer>
© 2026 MIRZAEI BOOKSTORE — Onde Cada Livro É Um Mundo
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
