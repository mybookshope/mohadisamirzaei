<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIRZAEI - BOOKSTORE</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
/* --- General Styles --- */
body {
  font-family: 'Arial', sans-serif;
  background-color: #f0f2f5;
  color: #333;
}

/* Header */
.navbar-brand {
  font-weight: bold;
  font-size: 1.5rem;
  color: #ffc107 !important;
}

.navbar-nav .nav-link {
  color: #fff !important;
  font-weight: 500;
}

.navbar-nav .nav-link:hover {
  color: #ffc107 !important;
}

/* Top Notice */
.top-notice {
  background-color: #0d6efd;
  color: white;
  text-align: center;
  padding: 5px 0;
  font-weight: bold;
}

/* Carousel */
.carousel-caption h5 {
  background-color: rgba(0,0,0,0.6);
  padding: 10px;
  border-radius: 5px;
}

/* Categories */
.category-card {
  background-color: #ffc107;
  color: #fff;
  font-weight: bold;
  transition: 0.3s;
  text-transform: uppercase;
}

.category-card:hover {
  background-color: #fd7e14;
  cursor: pointer;
}

/* Books */
.book-card {
  transition: 0.3s;
}

.book-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 25px rgba(0,0,0,0.2);
}

.card-title {
  font-weight: bold;
  color: #0d6efd;
}

.card-text {
  color: #555;
}

.btn-primary {
  background-color: #0d6efd;
  border: none;
}

.btn-primary:hover {
  background-color: #0b5ed7;
}

/* Cart */
#cartItems {
  max-height: 300px;
  overflow-y: auto;
}

/* Footer */
footer {
  background-color: #343a40;
  color: #fff;
  padding: 20px 0;
  margin-top: 50px;
}
</style>
</head>
<body>

<div class="top-notice">
  30 DAYS REFUND GUARANTEE | You Buy, We Give | See our reviews on Trustpilot
</div>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
<div class="container">
<a class="navbar-brand" href="#">MIRZAEI - BOOKSTORE</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse justify-content-end" id="navbarNav">
<ul class="navbar-nav me-auto mb-2 mb-lg-0">
<li class="nav-item dropdown">
<a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Categories</a>
<ul class="dropdown-menu">
<li><a class="dropdown-item" href="#">Bestsellers</a></li>
<li><a class="dropdown-item" href="#">Fiction</a></li>
<li><a class="dropdown-item" href="#">Non-Fiction</a></li>
<li><a class="dropdown-item" href="#">Children's</a></li>
<li><a class="dropdown-item" href="#">Bargain</a></li>
<li><a class="dropdown-item" href="#">Used</a></li>
<li><a class="dropdown-item" href="#">Gifts</a></li>
</ul>
</li>
</ul>
<form class="d-flex me-3">
<input class="form-control me-2" type="search" placeholder="Search">
<button class="btn btn-outline-warning" type="submit">Search</button>
</form>
<ul class="navbar-nav">
<li class="nav-item"><a class="nav-link" href="#">Login</a></li>
<li class="nav-item"><a class="nav-link" href="#">Register</a></li>
</ul>
</div>
</div>
</nav>

<footer class="text-center">
© 2026 MIRZAEI BOOKSTORE | Onde Cada Livro É Um Mundo
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
